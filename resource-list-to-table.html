<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>The Sims 2 resource list to table</title>
	<link rel="icon" type="image/x-icon" href="assets/favicon.svg">
	<link rel="stylesheet" href="assets/style.css?v=9" />
	<script src="assets/common.js?v=2"></script>
	<script src="assets/ts2-resource-info.js?v=1"></script>
	<style>
		:root {
			--table-border-color: #888;
		}
		
		body {
			display: flex;
			flex-direction: row;
			gap: var(--flex-gap);
		}
	
		@media (max-width: 100vh) {
			body {
				flex-direction: column;
			}
		}
	
		section {
			display: flex;
			flex: 1 1 auto;
			flex-direction: column;
			gap: var(--flex-gap);
		}
	
		textarea {
			flex-grow: 1;
		}
	
		#textareas {
			flex: 1 1;
		}
	
		#settings {
			flex: 0 1;
			flex-direction: var(--flex-direction-y);
			flex-wrap: wrap;
			justify-content: center;
			align-items: stretch;
		}

		#textareas:has(#output-html:placeholder-shown) #copy-html-button,
		#textareas:has(#output-bbcode:placeholder-shown) #copy-bbcode-button {
			display: none;
		}

		button {
			position: relative;
		}

		button.copied::after {
			content: 'Copied';
			position: absolute;
			left: 0;
			top: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			max-width: 100%;
			height: 100%;
			background: inherit;
			overflow: hidden;
		}

		#problems {
			gap: 0.25rem;
			flex: 0 1 max-content;
			overflow-y: auto;
		}

		#problems:empty {
			display: none;
		}

		.problem {
			padding: .25rem .5rem;
			margin: 0;
			border-radius: var(--border-radius);
			overflow-wrap: anywhere;
		}
	
		.error {
			background: var(--error-color);
			color: var(--on-error-color);
		}

		.warning {
			background: var(--warning-color);
			color: var(--on-warning-color);
		}

		#preview {
			overflow-y: auto;
			flex: 1.5 1 0;
		}

		#table-holder table {
			border-collapse: collapse;
			overflow-wrap: anywhere;
		}

		#table-holder td, #table-holder th {
			border: 1px solid var(--table-border-color);
			padding: .1rem .3rem;
		}

		.editor-table th {
			cursor: pointer;
			user-select: none;
		}

		.editor-table th:first-child {
			text-indent: 1.5rem; /* to avoid being covered by the corner tooltip */
		}

		.editor-table th[data-sort-direction]::after {
			margin-left: .5rem;
			content: '';
			display: inline-block;
			width: 1rem;
			height: 1rem;
			background-image: url(/assets/icons/sort.svg);
			background-size: 1rem;
			vertical-align: text-bottom;
		}

		.editor-table th[data-sort-direction='ascending']::after {
			background-image: url(/assets/icons/sort-ascending.svg);
		}
		.editor-table th[data-sort-direction='descending']::after {
			background-image: url(/assets/icons/sort-descending.svg);
		}

		#table-holder:empty + .corner-tooltip {
			display: none;
		}

		#preview .corner-tooltip {
			border-bottom: solid 1px var(--table-border-color);
			border-right: solid 1px var(--table-border-color);
		}
	</style>
</head>

<body>
	<section id="textareas">
		<textarea id="input" class="code" spellcheck="false" placeholder="Here goes your resource list generated by SimPe
To generate it, open your file in SimPe, select the resources you want
and then choose Tools/Create description from the top menu or press Ctrl+D
Once the list is generated in SimPe, press Ctrl+A to select all the items, and then Ctrl+C to copy them"></textarea>
		<section id="settings">
			<button id="paste-button" title="Paste the copied text from your clipboard into the resource list textbox">
				Paste resource list
			</button>
			<button id="copy-html-button" title="Copy the HTML table ode">
				Copy HTML
			</button>
			<button id="copy-bbcode-button" title="Copy the Mod The Sims BBCode table code">
				Copy MTS BBCode
			</button>
			<div id="site-icons">
				<a href="./" target="" title="Go to the home page">
					<img src="assets/icons/go-back.svg" />
				</a>
				<a href="https://github.com/Cosmatevs/cosmatevs.github.io" target="_blank"
					title="Go to the GitHub repository">
					<img src="assets/icons/github.svg" />
				</a>
				<a href="https://discord.gg/FrUfF8TN2h" target="_blank" title="Join the Discord server: Nopke's Labs">
					<img src="assets/icons/discord.svg" />
				</a>
				<a href="https://modthesims.info/misc.php?do=bbcode#table" target="_blank" title="Open Mod The Sims documentation of BBCode">
					<img src="assets/icons/mod-the-sims.svg" />
				</a>
			</div>
		</section>
		<section id="problems"></section>
		<textarea id="output-html" class="code" readonly placeholder="The resource list transformed into a HTML table"></textarea>
		<textarea id="output-bbcode" class="code" readonly placeholder="The resource list transformed into a Mod The Sims BBCode table"></textarea>
	</section>
	<section id="preview">
		<div id="table-holder"></div>
		<div class="corner-tooltip" title="Click column headers to sort the table
- this will also regenerate the code"></div>
	</section>

<script>

	/* Interactivity setup */

	const inputArea = document.getElementById('input');
	const pasteButton = document.getElementById('paste-button');
	const copyHTMLButton = document.getElementById('copy-html-button');
	const copyBBCodeButton = document.getElementById('copy-bbcode-button');
	const problemsArea = document.getElementById('problems');
	const outputHTMLArea = document.getElementById('output-html');
	const outputBBCodeArea = document.getElementById('output-bbcode');
	const tableHolder = document.getElementById('table-holder');
	const previewArea = document.getElementById('preview');

	let inputAreaDebounce = debounce(() => handleInput(inputArea.value), 500);
	window.addEventListener('load', async () => {
		inputArea.disabled = true;
		await ts2ResourceInfo.initializeGroups();
		await ts2ResourceInfo.initializeTypes();
		inputArea.disabled = false;
		inputArea.addEventListener('input', inputAreaDebounce);
		inputAreaDebounce(); // handle value retrieved by the browser
	});
	pasteButton.addEventListener('click', () => pasteClipboardIntoInput());
	copyHTMLButton.addEventListener('click', initializeCopyButtonClick(copyHTMLButton, () => outputHTMLArea.value));
	copyBBCodeButton.addEventListener('click', initializeCopyButtonClick(copyBBCodeButton, () => outputBBCodeArea.value));

	putPlaceholdersInTitles();

	function handleInput(input) {
		outputHTMLArea.value = '';
		outputBBCodeArea.value = '';
		problemsArea.innerHTML = null;
		tableHolder.innerHTML = null;

		if (input.trim().length === 0)
			return;
		
		try {
			let result = ResourceDescription.getDescriptionsFromSimPeText(input);
			let descriptions = result.descriptions;

			if (!descriptions.length)
				throw Error('No valid lines found');

			result.warnings.forEach(warning => {
				let warningParagraph = document.createElement("p");
				warningParagraph.classList.add('problem', 'warning');
				warningParagraph.title = 'Warning';
				warningParagraph.textContent = warning;
				problemsArea.append(warningParagraph);
			});

			let builder = new ResourceDescriptionTableBuilder(descriptions);
			outputHTMLArea.value = builder.generateHTMLSimpleTableCode();
			outputBBCodeArea.value = builder.generateMTSTableBBCode();

			tableHolder.append(builder.generateHTMLEditorTable(() => {
				outputHTMLArea.value = builder.generateHTMLSimpleTableCode();
				outputBBCodeArea.value = builder.generateMTSTableBBCode();
			}));
		}
		catch (error) {
			let errorParagraph = document.createElement("p");
			errorParagraph.classList.add('problem', 'error');
			errorParagraph.title = 'Error';
			errorParagraph.textContent = error.message;
			problemsArea.prepend(errorParagraph);
		}
	}

	function pasteClipboardIntoInput() {
		navigator.clipboard
			.readText()
			.then(text => {
				inputArea.value = text;
				handleInput(inputArea.value)
			});
	}

	function initializeCopyButtonClick(button, valueCallback) {
		let debounceRemoveCopiedClass = debounce(() => button.classList.remove('copied'), 500);
		return () => {
			navigator.clipboard.writeText(valueCallback());
			button.classList.add('copied');
			debounceRemoveCopiedClass();
		}
	}

	/* Resource representation */

	class ResourceDescription {
		constructor(properties) {
			this.typeId = properties.typeId;
			this.groupId = properties.groupId;
			this.instanceLow = properties.instanceLow;
			this.instanceHigh = properties.instanceHigh;

			let type = ts2ResourceInfo.getTypeById(this.typeId) ?? null;
			this.typeName = type?.longName ?? null;
			this.typeShortName = type?.shortName ?? null;

			let group = ts2ResourceInfo.getGroupById(this.groupId) ?? null;
			this.group = group;
			this.groupName = group?.name ?? null;

			if (!type || (type.canHaveName && !(properties.name === type.longName || properties.name === `[${type.longName}]`)))
				this.name = properties.name;
			else
				this.name = null;
		}

		static getDescriptionsFromSimPeText(simPeText) {
			if (simPeText.trim().length == 0)
				return [];
			
			let resourceLines = simPeText.split(/\r?\n/g);
			let notParsedLines = [];
			let resourceDescriptions = [];

			resourceLines.forEach(line => {
				line = line.trim();
				if (line.length === 0)
					return;

				let match = this.#resourceLineRegex.exec(line);
				if (match === null) {
					notParsedLines.push(line);
					return;
				}

				let g = match.groups;
				let resourceDescription = new ResourceDescription(g);
				resourceDescriptions.push(resourceDescription);
			});

			let warnings = notParsedLines.map(line => `Invalid line: ${line}`);

			resourceDescriptions
				.filter(description => description.groupName?.includes(' / '))
				.map(description => description.groupId)
				.filter(distinctFilter)
				.forEach(groupId => {
					warnings.push(`Group shared between many objects: ${groupId}`);
				});
			
			resourceDescriptions
				.filter(description => description.groupName === null)
				.map(description => description.groupId)
				.filter(distinctFilter)
				.forEach(groupId => {
					warnings.push(`Unknown group: ${groupId}`);
				});
			
			resourceDescriptions
				.filter(description => description.typeName === null)
				.map(description => description.typeId)
				.filter(distinctFilter)
				.forEach(typeId => {
					warnings.push(`Unknown type: ${typeId}`);
				});

			return {
				descriptions: resourceDescriptions,
				warnings: warnings
			};
		}

		static #resourceLineRegex = /^(?<name>.*?)(?<separator>.)(?<typeId>0x[0-9A-F]{8})\k<separator>(?<groupId>0x[0-9A-F]{8})\k<separator>(?<instanceHigh>0x[0-9A-F]{8})\k<separator>(?<instanceLow>0x[0-9A-F]{8})\k<separator>/;
	}

	class ResourceDescriptionTableBuilder {
		#propertyToColumnName = new Map([
			['name', 'Resource name'],
			['typeId', 'Type'],
			['typeName', 'Type name'],
			['groupId', 'Group'],
			['groupName', 'Group/object name'],
			['instanceLow', 'Instance'],
			['instanceHigh', 'Instance (high)']
		]);

		#propertiesInOrder = [
			'name', 'typeName', 'groupName',
			'typeId', 'groupId', 'instanceLow', 'instanceHigh'
		];

		constructor(descriptions) {
			let areHighInstancesPresent = descriptions.some(d => d.instanceHigh != '0x00000000');
			if (!areHighInstancesPresent)
				removeFromArray(this.#propertiesInOrder, 'instanceHigh');

			let areResourceNamesPresent = descriptions.some(d => d.name !== null);
			if (!areResourceNamesPresent)
				removeFromArray(this.#propertiesInOrder, 'name');

			this.descriptions = descriptions;
		}

		generateHTMLTableRowsCode() {
			let code = this.descriptions.map(description =>
					'\t<tr>\r\n'
					+ this.#propertiesInOrder.map(property => {
						let field = document.createElement('td');
						field.innerText = description[property];
						return '\t\t' + field.outerHTML;
					})
					.join('\r\n')
					+ '\r\n\t</tr>')
				.join('\r\n');
			return code;
		}

		generateHTMLSimpleTableCode() {
			let code = '<table>'
			
			// header
			code += '\r\n\t<tr>\r\n'
				+ this.#propertiesInOrder
				.map(property => {
					let headerField = document.createElement('th');
					headerField.textContent = this.#propertyToColumnName.get(property);
					return '\t\t' + headerField.outerHTML;
				})
				.join('\r\n')
				+ '\r\n\t</tr>';
			
			// rows
			code += '\r\n' + this.generateHTMLTableRowsCode();
			
			// finish
			code += '\r\n</table>'
			
			return code;
		}

		generateHTMLEditorTable(sortCallback = (property) => {}) {
			let table = document.createElement('table');
			table.classList.add('editor-table');
			let tableHead = document.createElement('thead');
			table.append(tableHead);
			let tableBody = document.createElement('tbody');
			table.append(tableBody);

			// header
			let header = document.createElement('tr');
			tableHead.append(header);
			this.#propertiesInOrder.forEach(property => {
					let headerField = document.createElement('th');
					headerField.dataset.property = property;
					headerField.dataset.sortDirection = 'none';
					headerField.title = 'Click to sort the table by this column'
					headerField.addEventListener(
						'click',
						() => this.#sortEditorTable(property, tableHead, tableBody, sortCallback)
					);
					headerField.textContent = this.#propertyToColumnName.get(property);
					header.append(headerField);
				});
			
			// rows
			tableBody.innerHTML = this.generateHTMLTableRowsCode();
			
			return table;
		}

		#sortEditorTable(property, tableHead, tableBody, callback = () => {})
		{
			let sortDirection = '';

			tableHead.firstChild.childNodes.forEach(headerField => {
				if (headerField.dataset.property === property) {
					sortDirection = headerField.dataset.sortDirection === 'ascending'
						? 'descending' : 'ascending';
					headerField.dataset.sortDirection = sortDirection;
					return;
				}

				headerField.dataset.sortDirection = 'none';
			});
			
			let sortDirectionMultiplier = sortDirection === 'descending' ? -1 : 1;
			this.descriptions.sort((d1, d2) =>
				(d1[property] ?? '').localeCompare(d2[property] ?? '')
				* sortDirectionMultiplier);

			tableBody.innerHTML = this.generateHTMLTableRowsCode();
			callback();
		}

		generateMTSTableBBCode() {
			let code = '[table]'
			
			// header
			code += this.#propertiesInOrder
				.map(property => this.#escapeSpecialBBCodeTableCharacters(this.#propertyToColumnName.get(property)))
				.join(' || ');
			
			// rows
			code += '\r\n' + this.descriptions
				.map(description => this.#propertiesInOrder
						.map(property => this.#escapeSpecialBBCodeTableCharacters(description[property]) ?? '')
						.join(' || '))
				.join('\r\n');
			
			// finish
			code += '\r\n[/table]'

			return code;
		}

		#escapeSpecialBBCodeTableCharacters(string) {
			if (string === null)
				return null;

			return string.replace(
				/[|,\[\]]/g,
				char => "&#" + char.charCodeAt(0) + ";"
			);
		}
	}
</script>
</body>

</html>
